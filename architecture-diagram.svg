    <text x="285" y="172" text-anchor="middle" font-size="9" fill="#818cf8">ThoughtStream (PPAE)</text>
    <text x="285" y="186" text-anchor="middle" font-size="9" fill="#818cf8">Overlay + Step Log</text>
  </g>
