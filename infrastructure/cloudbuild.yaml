steps:
  # Build backend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/prismux-backend"
      - "./backend"

  # Build frontend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/prismux-frontend"
      - "./frontend"

  # Push backend
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/prismux-backend"]

  # Push frontend
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/prismux-frontend"]

  # Deploy backend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "prismux-backend"
      - "--image=gcr.io/$PROJECT_ID/prismux-backend"
      - "--platform=managed"
      - "--region=us-central1"
      - "--memory=2Gi"
      - "--cpu=2"
      - "--timeout=300"
      - "--concurrency=1"
      - "--min-instances=0"
      - "--port=8000"
      - "--allow-unauthenticated"

  # Deploy frontend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "prismux-frontend"
      - "--image=gcr.io/$PROJECT_ID/prismux-frontend"
      - "--platform=managed"
      - "--region=us-central1"
      - "--memory=256Mi"
      - "--port=80"
      - "--allow-unauthenticated"

images:
  - "gcr.io/$PROJECT_ID/prismux-backend"
  - "gcr.io/$PROJECT_ID/prismux-frontend"

timeout: "1800s"
